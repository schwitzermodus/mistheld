<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#f4ead5" />
<title>Mistheld</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --bg:#f4ead5;--bg-2:#ece0c4;--paper:#faf3df;
  --ink:#2a2419;--ink-soft:#5b5240;
  --accent:#8b3a2b;--gold:#a98646;--green:#5b6b3a;
  --line:rgba(42,36,25,0.18);--line-soft:rgba(42,36,25,0.10);
  --shadow:0 10px 30px rgba(60,40,10,0.15),0 2px 6px rgba(60,40,10,0.08);
  --shadow-soft:0 4px 12px rgba(60,40,10,0.10);
  --serif:'Cormorant Garamond','Garamond','Georgia',serif;
  --sans:'Inter',system-ui,-apple-system,sans-serif;
  --might-origin:#3d5c2a;--might-adventure:#8b3a2b;--might-greatness:#2d4a6e;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden;overscroll-behavior:none}
body{font-family:var(--sans);color:var(--ink);background:var(--bg);
  background-image:radial-gradient(ellipse at top left,rgba(169,134,70,0.08) 0%,transparent 50%),radial-gradient(ellipse at bottom right,rgba(139,58,43,0.06) 0%,transparent 50%);
  min-height:100vh;min-height:100dvh;font-size:16px;line-height:1.5;
  -webkit-font-smoothing:antialiased;-webkit-user-select:none;user-select:none}
body.swipe-active{overflow:hidden;position:fixed;inset:0;width:100%;height:100%;touch-action:none}
.app{max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;position:relative;display:flex;flex-direction:column}
.screen{flex:1;display:none;flex-direction:column;padding:20px;animation:fadeIn 0.35s ease}
.screen.active{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
h1,h2,h3,h4{font-family:var(--serif);font-weight:600;letter-spacing:0.01em;color:var(--ink)}
h1{font-size:2.4rem;line-height:1.1}h2{font-size:1.7rem;line-height:1.2}h3{font-size:1.25rem;line-height:1.3}
.mute-btn,.settings-btn{position:fixed;top:max(12px,env(safe-area-inset-top,12px));width:42px;height:42px;border-radius:50%;border:1px solid var(--line);background:rgba(250,243,223,0.85);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-soft);z-index:200;transition:transform 0.15s ease,color 0.2s ease;-webkit-tap-highlight-color:transparent}
.mute-btn{right:max(12px,env(safe-area-inset-right,12px))}
.settings-btn{left:max(12px,env(safe-area-inset-left,12px))}
.mute-btn:active,.settings-btn:active{transform:scale(0.9)}
.mute-btn svg,.settings-btn svg{width:20px;height:20px}
.mute-btn .icon-off{display:none}
.mute-btn.muted .icon-on{display:none}
.mute-btn.muted .icon-off{display:block;color:var(--accent)}
/* WELCOME */
#screen-welcome{justify-content:flex-start;text-align:center;padding:80px 28px 56px;position:relative;overflow:hidden}
.welcome-head{flex-shrink:0}
.welcome-mark{font-family:var(--serif);font-style:italic;font-size:1rem;color:var(--accent);margin-bottom:8px;letter-spacing:0.12em;text-transform:uppercase}
.welcome-title{font-size:3rem;font-weight:500;font-style:italic;margin:6px 0 0;color:var(--ink);position:relative;display:inline-block}
.welcome-title::after{content:'';position:absolute;left:50%;bottom:-8px;width:60px;height:1px;background:var(--gold);transform:translateX(-50%)}
.welcome-preview{margin:14px auto 0;width:min(300px,calc(100% - 8px));height:384px;position:relative;perspective:1000px}
.wp-card{position:absolute;inset:0;background:var(--paper);border:1px solid var(--line);border-left:4px solid;border-radius:8px;box-shadow:var(--shadow);padding:20px 18px 18px;display:flex;flex-direction:column;align-items:center;text-align:center;transition:opacity 0.5s ease,transform 0.5s ease}
.wp-card.tc-origin{border-left-color:var(--might-origin)}
.wp-card.tc-adventure{border-left-color:var(--might-adventure)}
.wp-card.tc-greatness{border-left-color:var(--might-greatness)}
.wp-type{font-family:var(--serif);font-size:0.78rem;text-transform:uppercase;letter-spacing:0.16em;font-weight:600;margin-bottom:12px;line-height:1.2}
.tc-origin .wp-type{color:var(--might-origin)}
.tc-adventure .wp-type{color:var(--might-adventure)}
.tc-greatness .wp-type{color:var(--might-greatness)}
.wp-title-tag{font-family:var(--serif);font-size:1.55rem;font-style:italic;font-weight:700;line-height:1.2;color:var(--ink);background:rgba(169,134,70,0.13);border-left:3px solid var(--gold);padding:8px 12px;margin-bottom:6px;width:100%;text-align:center}
.wp-power-tag{font-family:var(--serif);font-size:1.02rem;line-height:1.3;color:var(--ink);background:rgba(169,134,70,0.07);border-left:2px solid rgba(169,134,70,0.35);padding:6px 12px;margin-bottom:5px;width:100%;text-align:center}
.wp-weakness-tag{font-family:var(--serif);font-style:italic;font-size:1.02rem;line-height:1.3;color:#7a3010;background:rgba(170,80,20,0.08);border-left:2px solid rgba(170,80,20,0.35);padding:6px 12px;margin-top:6px;width:100%;text-align:center}
.wp-quest{font-family:var(--serif);font-style:italic;font-weight:600;font-size:1.12rem;color:var(--ink);margin-top:auto;padding-top:12px;line-height:1.35;text-align:center}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--sans);font-weight:600;font-size:0.95rem;letter-spacing:0.02em;padding:14px 28px;border:none;border-radius:2px;cursor:pointer;transition:all 0.2s ease;min-height:48px;user-select:none}
#btn-start{align-self:center;padding:12px 32px;min-width:0;margin-top:auto}
.btn-primary{background:var(--ink);color:var(--bg)}
.btn-primary:hover{background:var(--accent)}
.btn-primary:active{transform:scale(0.98)}
/* SWIPE */
#screen-swipe{padding:56px 20px 12px;touch-action:none;overflow:hidden;position:relative}
.card-counter{text-align:center;font-size:0.85rem;color:var(--ink-soft);margin-bottom:10px;letter-spacing:0.06em;flex-shrink:0}
.card-stage{position:relative;flex:1;min-height:0;margin:0 auto;width:100%;max-width:360px;display:flex;align-items:center;justify-content:center;touch-action:none}
.card{position:absolute;width:100%;height:100%;background:var(--paper);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);padding:22px 24px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;cursor:grab;user-select:none;-webkit-user-select:none;touch-action:none;will-change:transform,opacity;transform:translate3d(0,0,0);transition:transform 0.4s cubic-bezier(0.18,0.89,0.32,1.18),opacity 0.3s ease-out}
.card.dragging{transition:none;cursor:grabbing}
.card.behind{pointer-events:none}
.card.behind-1{transform:translate3d(0,10px,0) scale(0.96);opacity:0.95}
.card.behind-2{transform:translate3d(0,20px,0) scale(0.92);opacity:0.82}
.card.front{z-index:20}
.card.gone-left{transform:translate3d(-130%,30px,0) rotate(-22deg) !important;opacity:0;transition:transform 0.9s cubic-bezier(0.4,0,0.5,1),opacity 0.65s ease-out}
.card.gone-right{transform:translate3d(130%,30px,0) rotate(22deg) !important;opacity:0;transition:transform 0.9s cubic-bezier(0.4,0,0.5,1),opacity 0.65s ease-out}
.card.abandoned{pointer-events:none}
@keyframes hint-swipe{0%{transform:translate3d(0,0,0)}18%{transform:translate3d(-28px,0,0) rotate(-4deg)}36%{transform:translate3d(0,0,0)}56%{transform:translate3d(32px,0,0) rotate(4deg)}74%,100%{transform:translate3d(0,0,0)}}
.card-hint{animation:hint-swipe 1.5s ease-in-out 0.9s 1 forwards}
/* #42: Theme-Type Tags auf Swipe-Karten */
.card-themes{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-bottom:10px}
.card-theme-tag{font-size:0.6rem;text-transform:uppercase;letter-spacing:0.09em;padding:2px 7px;border-radius:3px;font-family:var(--sans);font-weight:500}
.card-theme-tag.tc-origin{background:rgba(61,92,42,0.1);color:var(--might-origin)}
.card-theme-tag.tc-adventure{background:rgba(139,58,43,0.1);color:var(--might-adventure)}
.card-theme-tag.tc-greatness{background:rgba(45,74,110,0.1);color:var(--might-greatness)}
.card-theme-tag.tc-variable{background:rgba(169,134,70,0.12);color:var(--gold)}
.card-glyph{font-size:1.8rem;color:var(--gold);margin-bottom:8px;font-family:var(--serif);font-style:italic;position:relative}
.card-glyph::before,.card-glyph::after{content:'';display:inline-block;width:20px;height:1px;background:var(--gold);vertical-align:middle;margin:0 10px;opacity:0.6}
.card-title{font-family:var(--serif);font-size:1.7rem;font-weight:600;font-style:italic;line-height:1.2;color:var(--ink);max-width:280px}
.card-divider{width:36px;height:1px;background:var(--gold);margin:8px auto;opacity:0.65;flex-shrink:0}
.card-text{font-family:var(--serif);font-size:1.1rem;line-height:1.5;color:var(--ink);max-width:260px}
.card-decision-overlay{position:absolute;top:16px;font-family:var(--serif);font-size:2rem;font-style:italic;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:8px 16px;border:3px solid;border-radius:4px;opacity:0;pointer-events:none;transition:opacity 0.05s linear}
.card-decision-overlay.yes{right:18px;color:var(--green);border-color:var(--green);transform:rotate(-12deg)}
.card-decision-overlay.no{left:18px;color:var(--accent);border-color:var(--accent);transform:rotate(12deg)}
.swipe-controls{display:flex;justify-content:center;align-items:center;gap:14px;padding:10px 0 6px;flex-shrink:0}
.swipe-btn{width:64px;height:64px;border-radius:50%;border:2px solid;background:var(--paper);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s ease;box-shadow:0 2px 8px rgba(60,40,10,0.12)}
.swipe-btn:active{transform:scale(0.88)}
.swipe-btn-no{border-color:var(--accent);color:var(--accent)}
.swipe-btn-no:active{background:var(--accent);color:var(--paper)}
.swipe-btn-yes{border-color:var(--green);color:var(--green)}
.swipe-btn-yes:active{background:var(--green);color:var(--paper)}
.swipe-btn-undo{width:48px;height:48px;border-radius:50%;border:1px solid var(--line);background:rgba(250,243,223,0.9);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-soft);transition:all 0.15s ease}
.swipe-btn-undo:active{transform:scale(0.88)}
.swipe-btn-undo:disabled{opacity:0.3;cursor:not-allowed}
.swipe-btn svg{width:28px;height:28px}
.swipe-btn-undo svg{width:20px;height:20px}
/* #47: Skip-Button (erscheint nach 10 Swipes) */
.swipe-btn-skip{width:48px;height:48px;border-radius:50%;border:1px solid var(--line);background:rgba(250,243,223,0.9);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-soft);transition:all 0.15s ease}
.swipe-btn-skip:active{transform:scale(0.88);background:var(--bg-2)}
.swipe-btn-skip svg{width:20px;height:20px}
/* =====================================================
   ERGEBNIS-SCREEN (#38: feste Kartengröße, Carousel)
   BUG-SCHUTZ: Kein display-Property!
===================================================== */
#screen-result{padding:56px 20px 96px;overflow:hidden}
#result-stage{
  position:relative;
  flex:1;
  min-height:0;
  overflow:hidden
}
#result-dots{display:flex;justify-content:center;gap:8px;padding:10px 0 4px;flex-shrink:0}
.result-dot{width:7px;height:7px;border-radius:50%;border:none;background:var(--line);cursor:pointer;padding:0;transition:all 0.2s}
.result-dot.active{background:var(--accent);transform:scale(1.35)}
/* Karte füllt Stage komplett aus — gleiche Größe wie Swipe-Karten */
.result-card{
  position:absolute;
  inset:0;
  background:var(--paper);
  border:1px solid var(--line);
  border-radius:8px;
  box-shadow:var(--shadow);
  overflow-y:auto;
  -webkit-overflow-scrolling:touch
}
/* #39: Feder-Icon */
.rc-edit-btn{
  position:absolute;top:10px;right:10px;
  width:34px;height:34px;border-radius:50%;
  border:1px solid var(--line);background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--gold);transition:all 0.15s;z-index:2
}
.rc-edit-btn:active{transform:scale(0.9);background:var(--bg-2)}
.rc-edit-btn svg{width:15px;height:15px}
.rc-label{font-size:0.62rem;text-transform:uppercase;letter-spacing:0.14em;color:var(--ink-soft);margin-bottom:5px;font-family:var(--sans);text-align:center}
.rc-divider{height:1px;background:var(--line-soft)}
.rc-section{padding:10px 16px;text-align:center}
/* HELD-KARTE */
.rc-hero{padding:0}
.rc-hero-eyebrow{font-size:0.62rem;text-transform:uppercase;letter-spacing:0.18em;color:var(--accent);font-weight:600;padding:14px 16px 0;font-family:var(--sans);text-align:center}
.rc-hero-name{font-family:var(--serif);font-size:1.9rem;font-weight:600;font-style:italic;color:var(--ink);line-height:1.15;text-align:center}
.rc-hero-title{font-family:var(--serif);font-style:italic;font-size:1.05rem;color:var(--ink-soft);line-height:1.4;text-align:center}
.rc-hero-description{font-family:var(--serif);font-size:1.0rem;line-height:1.6;color:var(--ink);text-align:center}
/* THEME-KARTE (#40: zentriert, neu strukturiert) */
.rc-theme{padding:0;border-left-width:4px}
.rc-theme.tc-origin{border-left-color:var(--might-origin)}
.rc-theme.tc-adventure{border-left-color:var(--might-adventure)}
.rc-theme.tc-greatness{border-left-color:var(--might-greatness)}
.rc-theme-header{padding:14px 48px 12px 48px;border-bottom:1px solid var(--line-soft);text-align:center}
.rc-theme-name{font-family:var(--serif);font-size:1.6rem;font-weight:600;line-height:1.15;margin-bottom:5px}
.tc-origin .rc-theme-name{color:var(--might-origin)}
.tc-adventure .rc-theme-name{color:var(--might-adventure)}
.tc-greatness .rc-theme-name{color:var(--might-greatness)}
.rc-might-badge{font-size:0.62rem;text-transform:uppercase;letter-spacing:0.14em;padding:2px 8px;border-radius:3px;display:inline-block}
.tc-origin .rc-might-badge{background:rgba(61,92,42,0.1);color:var(--might-origin)}
.tc-adventure .rc-might-badge{background:rgba(139,58,43,0.1);color:var(--might-adventure)}
.tc-greatness .rc-might-badge{background:rgba(45,74,110,0.1);color:var(--might-greatness)}
.rc-theme-section{padding:8px 14px;border-bottom:1px solid var(--line-soft);text-align:center}
.rc-theme-section:last-child{border-bottom:none;padding-bottom:14px}
/* Titelschlagwort — größtes Element im Power-Tags-Block */
.rc-title-tag{font-family:var(--serif);font-size:1.55rem;font-style:italic;font-weight:700;line-height:1.2;color:var(--ink);background:rgba(169,134,70,0.13);border-left:3px solid var(--gold);padding:8px 14px;margin-top:5px;text-align:center}
.rc-power-tag{font-family:var(--serif);font-size:1.0rem;line-height:1.3;color:var(--ink);background:rgba(169,134,70,0.07);border-left:2px solid rgba(169,134,70,0.35);padding:5px 12px;margin-top:4px;text-align:center}
.rc-weakness-tag{font-family:var(--serif);font-style:italic;font-size:1.0rem;line-height:1.3;color:#7a3010;background:rgba(170,80,20,0.08);border-left:2px solid rgba(170,80,20,0.35);padding:5px 12px;margin-top:5px;text-align:center}
/* #44: Tier-Tag (nur sichtbar bei Stufen-Abweichung) */
.rc-tier-tag{font-family:var(--serif);font-style:italic;font-size:1.0rem;line-height:1.3;color:var(--gold);background:rgba(169,134,70,0.10);border-left:2px solid var(--gold);padding:5px 12px;margin-top:4px;text-align:center;font-weight:600}
/* Quest — größere Schrift (#40) */
.rc-quest-title{font-family:var(--serif);font-style:italic;font-weight:600;font-size:1.15rem;color:var(--ink);line-height:1.35;margin-top:6px;margin-bottom:5px;text-align:center}
.rc-quest-desc{font-family:var(--serif);font-style:italic;font-size:1.0rem;color:var(--ink-soft);line-height:1.5;text-align:center}
/* ÜBERSICHTS-KARTE (#41) */
.rc-save{padding:18px 16px 20px;text-align:center;overflow-y:auto}
.save-overview-title{font-family:var(--serif);font-size:0.7rem;text-transform:uppercase;letter-spacing:0.18em;color:var(--accent);font-weight:600;margin-bottom:8px}
.save-hero-name{font-family:var(--serif);font-size:1.8rem;font-weight:600;font-style:italic;color:var(--ink);line-height:1.2;margin-bottom:4px}
.save-hero-title{font-family:var(--serif);font-style:italic;font-size:0.95rem;color:var(--ink-soft);margin-bottom:14px;line-height:1.4}
.overview-tiles{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:16px}
.ot-tile{border-radius:6px;padding:9px;background:var(--paper);border:1px solid var(--line-soft);border-left-width:3px;text-align:center}
.ot-tile.tc-origin{border-left-color:var(--might-origin)}
.ot-tile.tc-adventure{border-left-color:var(--might-adventure)}
.ot-tile.tc-greatness{border-left-color:var(--might-greatness)}
.ot-type{font-family:var(--serif);font-size:0.72rem;font-weight:600;margin-bottom:5px;line-height:1.2}
.ot-tile.tc-origin .ot-type{color:var(--might-origin)}
.ot-tile.tc-adventure .ot-type{color:var(--might-adventure)}
.ot-tile.tc-greatness .ot-type{color:var(--might-greatness)}
.ot-tags{margin-bottom:5px}
.ot-power{font-family:var(--serif);font-size:0.78rem;color:var(--gold);display:block;line-height:1.3}
.ot-title{font-family:var(--serif);font-size:0.92rem;font-weight:600;color:var(--gold);display:block;line-height:1.3;margin-bottom:2px}
.ot-tier{font-family:var(--serif);font-style:italic;font-size:0.78rem;color:var(--gold);display:block;line-height:1.3;font-weight:600}
.ot-weakness{font-family:var(--serif);font-style:italic;font-size:0.78rem;color:#7a3010;display:block;line-height:1.3}
.ot-quest{font-family:var(--serif);font-style:italic;font-size:0.74rem;color:var(--ink-soft);line-height:1.3}
.save-actions{display:flex;flex-direction:column;gap:8px}
.save-btn-primary{width:100%;padding:14px;border-radius:4px;border:none;background:var(--ink);color:var(--paper);font-family:var(--sans);font-size:0.95rem;font-weight:600;cursor:pointer;transition:background 0.2s}
.save-btn-primary:active{background:var(--accent)}
.save-btn-ghost{width:100%;padding:8px;border:none;background:transparent;color:var(--ink-soft);font-family:var(--sans);font-size:0.82rem;cursor:pointer}
/* EDIT SHEET */
#edit-sheet-overlay{position:fixed;inset:0;background:rgba(42,36,25,0.52);display:none;flex-direction:column;justify-content:flex-end;z-index:80}
#edit-sheet-overlay.active{display:flex;animation:fadeIn 0.25s ease}
#edit-sheet{background:var(--paper);border-radius:18px 18px 0 0;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:max(16px,env(safe-area-inset-bottom,16px))}
.edit-sheet-handle{width:38px;height:4px;border-radius:2px;background:var(--line);margin:12px auto 14px}
.es-header{padding:0 20px 12px;border-bottom:1px solid var(--line-soft);margin-bottom:4px}
.es-themebook{font-family:var(--serif);font-size:1.35rem;font-weight:600;color:var(--ink)}
.es-might{font-size:0.68rem;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.12em;margin-top:2px}
.es-row{display:flex;align-items:center;gap:10px;padding:10px 20px;border-bottom:1px solid var(--line-soft)}
.es-row-content{flex:1;min-width:0}
.es-label{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--ink-soft);margin-bottom:3px}
.es-value{font-family:var(--serif);font-size:1.08rem;font-style:italic;color:var(--ink);line-height:1.3}
.es-weak{color:#7a3010}
.es-nav{display:flex;align-items:center;gap:6px;margin-top:5px}
.es-nav-btn{background:none;border:none;color:var(--gold);font-size:1.1rem;padding:0 5px;cursor:pointer;line-height:1}
.es-nav-btn:disabled{opacity:0.22}
.es-nav-pos{font-size:0.68rem;color:var(--ink-soft)}

var HERO_DESCRIPTIONS=['Wer sie einmal angesehen hat, vergisst diesen Blick nicht. Sie spricht wenig — aber wenn sie es tut, hören selbst die Alten zu.','Er hat mehr Abschied erlebt als die meisten in einem ganzen Leben. Irgendwann hört man auf, sich zu wundern, warum er keine Bindungen mehr eingeht.','Auf den ersten Blick wirkt sie wie eine von vielen. Wer länger hinschaut, bemerkt, wie ihre Augen den Raum lesen — als suche sie immer einen Ausweg.','Die Narben auf seinen Händen erzählen eine Geschichte, die er selbst nicht mehr vollständig kennt. Er lebt mit dem, was übrig geblieben ist.','Sie ist nicht grausam. Aber die Grenze zwischen ihr und dem, was sie tut, ist dünner, als es von außen aussieht. Wer sie kennt, weiß das.','Er sagt, er kommt aus dem Norden. Was genau das bedeutet, lässt er offen — wer nachbohrt, bereut es meistens.','Manche Menschen sind von der Welt abgerieben, bis nur das Wesentliche übrig bleibt. Sie ist so jemand.','Das Lachen kommt ihr leicht, aber es erreicht nie ganz die Augen. Die sie wirklich kennen, wissen, was dahintersteckt.','Er hatte einmal einen anderen Namen. Was ihn dazu gebracht hat, diesen hinter sich zu lassen, erzählt er nicht. Manche Dinge trägt man besser allein.','Sie ist schnell vertraut mit fremden Orten — als wäre sie geübt darin, sich anzupassen, weil sie keine andere Wahl hatte.','Wer mit ihm reist, schläft besser. Er selbst kaum. Das Dunkel kennt ihn beim Namen.','Die Leute in ihrem Dorf respektieren sie. Lieben tun sie die wenigsten. Das ist ihr recht.','Er ist kein böser Mensch — nur jemand, dem zu viele schlechte Dinge passiert sind, bis er aufgehört hat, zwischen gut und notwendig zu unterscheiden.','Auf sie zu warten lohnt sich. Sie kommt immer — nur selten dann, wenn man es erwartet.','Es gibt Menschen, denen man ansieht, dass sie früher jemand anderen kannten. Jemanden, der einfacher war. Sie ist einer davon.','Seine Hände sind ruhig, sein Urteil auch. Beides hat ihn schon aus Situationen herausgebracht, aus denen andere nicht zurückgekommen wären.','Sie erinnert sich an alles. Das klingt wie eine Gabe. Es ist keine.','Er hat gelernt, die Stille zu mögen — nicht weil er sie sucht, sondern weil sie ihn meistens findet.','Manche halten sie für kalt. Sie ist es nicht — sie ist nur sehr darauf bedacht, wem sie welche Wärme schenkt.','Irgendwo zwischen dem, was er war, und dem, was er geworden ist, liegt eine Geschichte. Er erzählt sie nicht.','Sie hat das Glück, das man nicht kaufen kann — und das Pech, das einem nie ganz löslässt. Beides trägt sie mit Würde.','Man fragt sich manchmal, was ihn antreibt. Die Antwort: er selbst weiß es nicht mehr genau.','Ihre Stimme ist ruhig, selbst wenn sie Dinge sagt, die andere erschrecken. Das ist das Erschreckendste daran.','Er ist jemand, der zuhört, bevor er spricht. In der Welt, in der er lebt, ist das eine Seltenheit — manchmal auch ein Vorteil.','Sie vertraut nicht leichtfertig. Dieses Vertrauen kostet etwas — und die meisten können sich den Preis nicht leisten.','Die Art, wie er die Welt betrachtet, erinnert an einen, der zu viel davon gesehen hat. Nicht verbittert — nur ehrlich.','Sie hat nicht viele Freunde. Die sie hat, würden für sie durch Feuer gehen. Das ist keine Übertreibung.','Er trägt seinen Namen wie ein Versprechen — eines, das er sich selbst gegeben hat. Ob er es halten kann, weiß er noch nicht.','Manchmal fragt man sich, ob sie Angst kennt. Sie tut es. Sie hat nur gelernt, ihr die Hand zu schütteln statt wegzulaufen.','Er ist in vielen Welten zu Hause, aber in keiner wirklich angekommen. Das macht ihn zu jemandem, dem man vertrauen kann — und dem man manchmal hinterherschaut.'];
