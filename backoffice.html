<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mistheld · Tag-Review (Backoffice)</title>
<style>
:root{
  --bg:#f4ead5;--bg-2:#ece0c4;--paper:#faf3df;
  --ink:#2a2419;--ink-soft:#5b5240;
  --accent:#8b3a2b;--gold:#a98646;--green:#5b6b3a;
  --line:rgba(42,36,25,0.18);--line-soft:rgba(42,36,25,0.10);
  --shadow:0 10px 30px rgba(60,40,10,0.15),0 2px 6px rgba(60,40,10,0.08);
  --shadow-soft:0 4px 12px rgba(60,40,10,0.10);
  --serif:'Cormorant Garamond','Garamond','Georgia',serif;
  --might-origin-soft:#62724e;--might-adventure-soft:#915e4f;--might-greatness-soft:#656c6b;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--serif);color:var(--ink);background:var(--bg);
  background-image:radial-gradient(ellipse at top left,rgba(169,134,70,0.08) 0%,transparent 50%);
  font-size:17px;line-height:1.45;padding:0 0 80px}
.wrap{max-width:760px;margin:0 auto;padding:20px 18px}
h1{font-size:1.5rem;font-weight:700}
.sub{color:var(--ink-soft);font-size:0.95rem;margin-top:2px}

/* Topbar */
.topbar{position:sticky;top:0;z-index:10;background:var(--bg-2);border-bottom:1px solid var(--line);
  box-shadow:var(--shadow-soft)}
.topbar .wrap{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding-top:12px;padding-bottom:12px}
.topbar .grow{flex:1;min-width:140px}
.nav-btn{font-family:var(--serif);font-size:0.95rem;border:1px solid var(--line);background:var(--paper);
  color:var(--ink);border-radius:8px;padding:7px 14px;cursor:pointer}
.nav-btn:disabled{opacity:0.4;cursor:not-allowed}
.progress{font-size:0.88rem;color:var(--ink-soft)}
.toolbar{padding-top:0!important;gap:8px}
.toolbar .nav-btn{font-size:0.85rem;padding:5px 11px}
.toolbar-note{font-size:0.78rem;color:var(--ink-soft);margin-left:auto}
select{font-family:var(--serif);font-size:0.9rem;padding:6px 8px;border:1px solid var(--line);
  border-radius:8px;background:var(--paper);color:var(--ink);max-width:280px}

/* Theme header */
.theme-head{margin:22px 0 6px;padding:16px 18px;border-radius:14px;background:var(--paper);
  border:1px solid var(--line);box-shadow:var(--shadow-soft);border-left:8px solid var(--gold)}
.theme-head.tier-origin{border-left-color:var(--might-origin-soft)}
.theme-head.tier-adventure{border-left-color:var(--might-adventure-soft)}
.theme-head.tier-greatness{border-left-color:var(--might-greatness-soft)}
.theme-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:0.8rem;color:var(--ink-soft);
  text-transform:uppercase;letter-spacing:0.06em}
.tier-badge{padding:2px 9px;border-radius:999px;color:#fff;font-size:0.72rem;letter-spacing:0.04em}
.tier-origin .tier-badge,.badge-origin{background:var(--might-origin-soft)}
.tier-adventure .tier-badge,.badge-adventure{background:var(--might-adventure-soft)}
.tier-greatness .tier-badge,.badge-greatness{background:var(--might-greatness-soft)}
.theme-title{font-size:1.65rem;font-weight:700;margin-top:4px}
.section-label{margin:18px 2px 6px;font-size:0.78rem;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--ink-soft)}

/* Tag card */
.tag{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:14px 16px;
  margin:10px 0;box-shadow:var(--shadow-soft)}
.tag.rated{border-color:var(--green)}
.tag-top{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.tag-text{font-size:1.2rem;font-weight:700}
.kind{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.06em;padding:2px 8px;border-radius:999px;
  color:#fff}
.kind.power{background:var(--green)}
.kind.weakness{background:var(--accent)}
.tag-id{margin-left:auto;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:0.72rem;color:var(--ink-soft);
  opacity:0.8}
.tag-desc{margin-top:7px;font-size:1.02rem}
.tag-ex{margin-top:4px;font-size:0.98rem;color:var(--ink-soft)}
.tag-ex b{color:var(--ink);font-weight:600}
.no-desc{margin-top:7px;font-style:italic;color:var(--accent)}

/* Votes */
.votes{display:flex;gap:8px;margin-top:12px}
.vote{font-size:1.15rem;border:1px solid var(--line);background:#fff;border-radius:10px;padding:8px 14px;
  cursor:pointer;line-height:1;transition:transform 0.1s ease,background 0.15s ease,border-color 0.15s ease}
.vote:active{transform:scale(0.92)}
.vote .lbl{font-size:0.8rem;margin-left:6px}
.vote.sel-down{background:rgba(139,58,43,0.14);border-color:var(--accent)}
.vote.sel-up{background:rgba(91,107,58,0.16);border-color:var(--green)}
.vote.sel-double{background:rgba(169,134,70,0.20);border-color:var(--gold)}
.note{margin-top:10px;width:100%;font-family:var(--serif);font-size:0.98rem;padding:8px 10px;
  border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);resize:vertical;min-height:40px}

/* Footer done bar */
.footer{position:fixed;left:0;right:0;bottom:0;background:var(--bg-2);border-top:1px solid var(--line);
  box-shadow:0 -4px 12px rgba(60,40,10,0.10);z-index:10}
.footer .wrap{display:flex;align-items:center;gap:12px;padding-top:12px;padding-bottom:12px}
.footer .hint{font-size:0.85rem;color:var(--ink-soft);flex:1}
.btn-done{font-family:var(--serif);font-size:1.05rem;font-weight:700;border:none;border-radius:10px;
  padding:11px 26px;cursor:pointer;background:var(--green);color:#fff;box-shadow:var(--shadow-soft)}
.btn-done:disabled{background:#cfc6ad;color:#8a8064;cursor:not-allowed;box-shadow:none}
.saved{font-size:0.8rem;color:var(--green);opacity:0;transition:opacity 0.2s ease}
.saved.show{opacity:1}

.empty{margin-top:40px;text-align:center;color:var(--ink-soft)}
.done-tick{color:var(--green);font-weight:700;margin-left:6px}
</style>
</head>
<body>
<div class="topbar"><div class="wrap">
  <div class="grow">
    <h1>Tag-Review <span style="font-weight:400;color:var(--ink-soft);font-size:1rem">· Backoffice</span></h1>
    <div class="sub" id="progress">…</div>
  </div>
  <button class="nav-btn" id="btn-prev">‹ Zurück</button>
  <select id="jump" title="Zu Bündel springen"></select>
  <button class="nav-btn" id="btn-next">Weiter ›</button>
</div>
<div class="wrap toolbar">
  <button class="nav-btn" id="btn-export">⬇ Export</button>
  <button class="nav-btn" id="btn-copy">⧉ Kopieren</button>
  <button class="nav-btn" id="btn-import">⬆ Import</button>
  <input type="file" id="file-import" accept="application/json,.json" hidden />
  <span class="toolbar-note" id="mode-note"></span>
</div></div>

<div class="wrap" id="content"></div>

<div class="footer"><div class="wrap">
  <span class="hint" id="done-hint"></span>
  <span class="saved" id="saved">gespeichert ✓</span>
  <button class="btn-done" id="btn-done" disabled>Fertig &amp; weiter</button>
</div></div>

<script type="module" src="/src/review/main.ts"></script>
</body>
</html>
