name: QA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  qa:
    name: Smoke Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Versionsbump prüfen (kein Deploy ohne neue Version)
        run: |
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            prev=$(git show HEAD^:index.html | sed -n 's/.*class="app-version">\([^<]*\).*/\1/p' | head -n1)
            cur=$(sed -n 's/.*class="app-version">\([^<]*\).*/\1/p' index.html | head -n1)
            echo "Version vorher: '$prev' | jetzt: '$cur'"
            if [ "$prev" = "$cur" ]; then
              echo "::error::App-Version wurde nicht erhöht ('$cur'). Kein Deploy ohne neue Version — bitte index.html bumpen (der pre-commit Hook macht das automatisch)."
              exit 1
            fi
          else
            echo "Kein Vorgänger-Commit — Versionsprüfung übersprungen."
          fi

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: TypeScript-Typecheck
        run: npm run typecheck

      - name: Tag-Definition prüfen (TAGS.md)
        run: node tools/validate_tags.cjs

      - name: Playwright-Browser-Cache laden
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-chromium-${{ runner.os }}-

      - name: Playwright installieren
        run: npx playwright install --with-deps chromium

      - name: Smoke Tests
        run: npm test

      - name: Test-Report hochladen (bei Fehler)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
