<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#f4ead5" />
<title>Mistheld</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4ead5;--bg-2:#ece0c4;--paper:#faf3df;
  --ink:#2a2419;--ink-soft:#5b5240;
  --accent:#8b3a2b;--gold:#a98646;--green:#5b6b3a;
  --line:rgba(42,36,25,0.18);--line-soft:rgba(42,36,25,0.10);
  --shadow:0 10px 30px rgba(60,40,10,0.15),0 2px 6px rgba(60,40,10,0.08);
  --shadow-soft:0 4px 12px rgba(60,40,10,0.10);
  --serif:'Cormorant Garamond','Garamond','Georgia',serif;
  /* Eine Schrift überall (Wunsch): --sans zeigt jetzt ebenfalls auf die Serife */
  --sans:'Cormorant Garamond','Garamond','Georgia',serif;
  --might-origin:#3d5c2a;--might-adventure:#8b3a2b;--might-greatness:#42525a;
  /* Gedämpfte Töne (entsättigt) für die Theme-Karten-Bänder/Rahmen — leichtgewichtiger */
  --might-origin-soft:#62724e;--might-adventure-soft:#915e4f;--might-greatness-soft:#656c6b;
  /* LitM-Akzente verankert: Nebel-Schiefer + goldene Stunde */
  --mist:#6e8088;--gold-glow:#d9b878;
  /* Fester Typo-Maßstab — nur diese Größen verwenden (mobil-lesbare Minima) */
  --fs-xl:2.6rem;--fs-display:1.9rem;--fs-title:1.3rem;--fs-body-lg:1.12rem;--fs-body:1rem;--fs-label:0.82rem;--fs-micro:0.72rem;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
body{font-family:var(--sans);color:var(--ink);background:var(--bg);
  background-image:radial-gradient(ellipse at top left,rgba(169,134,70,0.08) 0%,transparent 50%),radial-gradient(ellipse at bottom right,rgba(139,58,43,0.06) 0%,transparent 50%);
  min-height:100vh;min-height:100dvh;font-size:16px;line-height:1.5;
  -webkit-font-smoothing:antialiased;-webkit-user-select:none;user-select:none}
body.swipe-active{overflow:hidden;position:fixed;inset:0;width:100%;height:100%;touch-action:none}
.app{max-width:480px;margin:0 auto;height:100vh;height:100dvh;position:relative;display:flex;flex-direction:column}
.screen{flex:1;min-height:0;display:none;flex-direction:column;padding:20px;animation:fadeIn 0.35s ease;position:relative;z-index:1}
.screen.active{display:flex}
/* Persistenter Szenen-Hintergrund: einmal hinter allen Screens, kein Reload beim Wechsel */
.app-bg{position:absolute;inset:0;z-index:0;overflow:hidden;pointer-events:none;background:linear-gradient(180deg,#ecd7a6 0%,#e3d2ac 16%,#d0d2c2 38%,#b3bcb0 56%,#92a08b 72%,#6a7a4f 88%,#516037 100%)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
h1,h2,h3,h4{font-family:var(--serif);font-weight:600;letter-spacing:0.01em;color:var(--ink)}
h1{font-size:2.4rem;line-height:1.1}h2{font-size:1.7rem;line-height:1.2}h3{font-size:1.25rem;line-height:1.3}
.mute-btn,.settings-btn{position:fixed;top:max(12px,env(safe-area-inset-top,12px));width:42px;height:42px;border-radius:50%;border:1px solid var(--line);background:rgba(250,243,223,0.85);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-soft);z-index:200;transition:transform 0.15s ease,color 0.2s ease;-webkit-tap-highlight-color:transparent;transform:translate3d(0,0,0);will-change:transform}
.mute-btn{right:max(12px,env(safe-area-inset-right,12px))}
.settings-btn{left:max(12px,env(safe-area-inset-left,12px))}
.mute-btn:active,.settings-btn:active{transform:translate3d(0,0,0) scale(0.9)}
.mute-btn svg,.settings-btn svg{width:20px;height:20px}
.mute-btn .icon-off{display:none}
.mute-btn.muted .icon-on{display:none}
.mute-btn.muted .icon-off{display:block;color:var(--accent)}
/* WELCOME */
#screen-welcome{padding:0;position:relative;overflow:hidden}
.welcome-scroll{flex:1;min-height:0;width:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;text-align:center;padding:56px 24px 40px;position:relative;z-index:1}
.welcome-head{flex-shrink:0}
.welcome-head,.welcome-preview,#btn-start{position:relative;z-index:1}
.wb-mountains{position:absolute;left:0;right:0;bottom:24%;width:100%;height:200px;opacity:0.42}
.wb-mist{position:absolute;left:-25%;right:-25%;height:130px;background:radial-gradient(ellipse 50% 60% at 50% 50%,rgba(238,233,216,0.7),transparent 70%);filter:blur(7px)}
.wb-mist-1{top:40%;animation:wbDrift1 46s ease-in-out infinite alternate}
.wb-mist-2{top:57%;opacity:0.7;animation:wbDrift2 64s ease-in-out infinite alternate}
@keyframes wbDrift1{from{transform:translateX(-7%)}to{transform:translateX(9%)}}
@keyframes wbDrift2{from{transform:translateX(8%)}to{transform:translateX(-9%)}}
@media(prefers-reduced-motion:reduce){.wb-mist-1,.wb-mist-2{animation:none}}
.wb-grain{position:absolute;inset:0;opacity:0.06;mix-blend-mode:multiply;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100' height='100' filter='url(%23n)'/></svg>")}
.welcome-title{text-shadow:0 1px 16px rgba(244,234,213,0.7)}
#screen-swipe{position:relative}
#screen-swipe>.card-counter,#screen-swipe>.card-stage,#screen-swipe>.swipe-controls{position:relative;z-index:1}
#btn-start{box-shadow:0 6px 18px rgba(40,30,15,0.32)}
.app-version{position:absolute;left:max(12px,env(safe-area-inset-left,12px));bottom:max(10px,env(safe-area-inset-bottom,10px));font-family:var(--sans);font-size:0.68rem;letter-spacing:0.04em;color:#f0e6cf;opacity:0.8;text-shadow:0 1px 4px rgba(40,30,15,0.45);z-index:1;user-select:none;pointer-events:none}
.welcome-mark{font-family:var(--serif);font-style:italic;font-size:1.15rem;color:var(--accent);margin-bottom:8px;letter-spacing:0.12em;text-transform:uppercase}
.welcome-title{font-size:3.2rem;font-weight:500;font-style:italic;margin:6px 0 0;color:var(--ink);position:relative;display:inline-block}
/* Vorschau: feste Höhe = konsistente Größe bei jedem Wechsel */
.welcome-preview{margin:16px auto 0;width:min(360px,calc(100% - 8px));position:relative}
#welcome-preview .hb-theme{margin:0;transition:opacity 0.5s ease}
/* Vorschau-Karte kompakter: feste Einzeiler + 2-Zeilen-Quest */
#welcome-preview .hb-theme-mid{padding:8px 14px 10px}
#welcome-preview .hb-titletag{font-size:var(--fs-display);padding:8px 10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#welcome-preview .hb-powertag,#welcome-preview .hb-weakness{font-size:var(--fs-body-lg);padding:5px 10px;margin-top:6px}
#welcome-preview .hb-quest-title{display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
#welcome-preview .hb-quest-desc{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--sans);font-weight:600;font-size:0.95rem;letter-spacing:0.02em;padding:14px 28px;border:none;border-radius:2px;cursor:pointer;transition:all 0.2s ease;min-height:48px;user-select:none}
#btn-start{align-self:center;padding:12px 32px;min-width:0;margin-top:20px}
.btn-primary{background:var(--ink);color:var(--bg)}
.btn-primary:hover{background:var(--accent)}
.btn-primary:active{transform:scale(0.98)}
/* INTRO / Zwischenschritt: geschlossene Pergament-Tafel mit Kopfband (Konzept 3) */
#screen-intro{padding:0;position:relative;overflow:hidden}
.intro-wrap{flex:1;min-height:0;width:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:calc(40px + env(safe-area-inset-top,0px)) 22px 28px;position:relative;z-index:1;display:flex;flex-direction:column;justify-content:flex-start;align-items:center;gap:18px}
.intro-card{width:min(360px,100%);background:var(--paper);border:2px solid var(--gold);border-radius:14px;overflow:hidden;box-shadow:0 12px 28px rgba(40,30,10,0.34)}
.intro-band{background:linear-gradient(90deg,#b89758,#a98646);padding:12px 16px;text-align:center}
.intro-band-title{color:#fbf3df;font-family:var(--serif);font-style:italic;font-weight:600;font-size:1.5rem;line-height:1.15}
.intro-body{padding:16px 16px 18px}
.intro-lead{font-size:var(--fs-body-lg);line-height:1.5;color:var(--ink);text-align:center;margin:0}
.intro-modelabel{font-size:var(--fs-label);text-transform:uppercase;letter-spacing:0.16em;color:var(--ink-soft);font-weight:700;text-align:center;margin:16px 0 10px}
.intro-modes{display:flex;flex-direction:column;gap:8px}
.intro-mode{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:9px;padding:12px 13px;background:#fbf6e8;cursor:pointer;text-align:left;font-family:var(--serif);transition:transform 0.12s,background 0.12s}
.intro-mode:active{transform:scale(0.99)}
.intro-mode.on{border:1px solid var(--might-origin-soft);background:var(--might-origin-soft)}
.intro-mode-name{font-weight:700;font-size:var(--fs-body-lg);color:var(--ink);flex:1;min-width:0}
.intro-mode.on .intro-mode-name{color:#f3ecd9}
.intro-mode-tick{flex-shrink:0;font-size:1.1rem;font-weight:700;color:transparent;line-height:1}
.intro-mode.on .intro-mode-tick{color:#f3ecd9}
/* Erklärtext des gewählten Modus — unter den Kacheln, nicht in ihnen */
.intro-modedesc{font-size:var(--fs-body);color:var(--ink);line-height:1.45;text-align:center;margin-top:11px;min-height:2.8rem}
.intro-hint{font-size:var(--fs-label);color:var(--ink-soft);text-align:center;line-height:1.4;margin-top:12px}
.intro-settings-link{color:var(--accent);text-decoration:underline;text-underline-offset:2px;cursor:pointer}
.intro-actions{display:flex;gap:10px;align-items:center;justify-content:center}
#btn-intro-start{flex-shrink:0;padding:13px 36px;box-shadow:0 6px 18px rgba(40,30,15,0.32)}
.btn-ghost{flex-shrink:0;background:rgba(250,243,223,0.9);color:var(--ink);border:1px solid var(--line);padding:13px 28px;box-shadow:0 4px 12px rgba(40,30,15,0.18)}
.btn-ghost:hover{background:var(--paper)}
.btn-ghost:active{transform:scale(0.98)}
/* SWIPE */
#screen-swipe{padding:56px 20px 12px;touch-action:none;overflow:hidden;position:relative}
.card-counter{text-align:center;font-size:0.85rem;color:var(--ink-soft);margin-bottom:10px;letter-spacing:0.06em;flex-shrink:0}
.card-stage{position:relative;flex:1;min-height:0;margin:0 auto;width:100%;max-width:360px;display:flex;align-items:center;justify-content:center;touch-action:none}
.card{position:absolute;width:100%;height:100%;background:var(--paper);border:2px solid var(--gold);border-radius:10px;box-shadow:var(--shadow);padding:0;display:flex;flex-direction:column;overflow:hidden;cursor:grab;user-select:none;-webkit-user-select:none;touch-action:none;will-change:transform,opacity;transform:translate3d(0,0,0);transition:transform 0.4s cubic-bezier(0.18,0.89,0.32,1.18),opacity 0.3s ease-out}
.card.dragging{transition:none;cursor:grabbing}
.card.behind{pointer-events:none}
.card.behind-1{transform:translate3d(0,10px,0) scale(0.96);opacity:0.95}
.card.behind-2{transform:translate3d(0,20px,0) scale(0.92);opacity:0.82}
.card.front{z-index:20}
.card.gone-left{transform:translate3d(-130%,30px,0) rotate(-22deg) !important;opacity:0;transition:transform 0.9s cubic-bezier(0.4,0,0.5,1),opacity 0.65s ease-out}
.card.gone-right{transform:translate3d(130%,30px,0) rotate(22deg) !important;opacity:0;transition:transform 0.9s cubic-bezier(0.4,0,0.5,1),opacity 0.65s ease-out}
.card.abandoned{pointer-events:none}
@keyframes hint-swipe{0%{transform:translate3d(0,0,0)}18%{transform:translate3d(-28px,0,0) rotate(-4deg)}36%{transform:translate3d(0,0,0)}56%{transform:translate3d(32px,0,0) rotate(4deg)}74%,100%{transform:translate3d(0,0,0)}}
.card-hint{animation:hint-swipe 1.5s ease-in-out 0.9s 1 forwards}
/* Geschmeidiger Übergang: neue Front-Karte + ihr Bild blenden sanft ein
   (nur .front, damit hintere Karten beim Neuaufbau nicht flackern) */
@keyframes cardIn{from{opacity:0}to{opacity:1}}
.card.front .card-content{animation:cardIn 0.3s ease-out}
/* Kopfband: golden-neutral (Inspiration = unbestimmtes Potenzial, keine Might-Farbe) */
.card-band{flex-shrink:0;padding:8px 15px;display:flex;align-items:center;justify-content:space-between;gap:8px;background:linear-gradient(90deg,#b89758,#a98646)}
.card-band *{color:#fbf3df}
.card-eyebrow{font-size:var(--fs-body);text-transform:uppercase;letter-spacing:0.14em;font-weight:600}
/* Mitte: Pergament füllt die Höhe; Titel/Beschreibung oben zentriert, Archetypen unten verankert */
.card-body{flex:1;min-height:0;display:flex;flex-direction:column;padding:16px 22px;overflow:hidden}
.card-prompt{flex:1;min-height:0;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.card-title{font-family:var(--serif);font-size:var(--fs-display);font-weight:600;font-style:italic;line-height:1.2;color:var(--ink);max-width:290px}
/* ❖-Trenner im Heldenblatt-Stil */
.card-divider{display:flex;align-items:center;justify-content:center;gap:9px;color:var(--gold);width:100%;max-width:200px;margin:11px auto;flex-shrink:0}
.card-divider::before,.card-divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(169,134,70,0.6))}
.card-divider::after{background:linear-gradient(90deg,rgba(169,134,70,0.6),transparent)}
.card-divider-mark{font-size:0.85rem;line-height:1}
.card-text{font-family:var(--serif);font-size:var(--fs-title);line-height:1.45;color:var(--ink-soft);max-width:280px}
/* Archetypen: kompakte Helden-Beispiele in einer Zeile */
.card-archetypes{flex-shrink:0;text-align:center;font-family:var(--serif);font-size:var(--fs-body);color:var(--ink);line-height:1.4;margin-top:16px;text-wrap:balance}
.card-arch-label{color:var(--ink-soft);font-style:italic}
/* Fußband: Theme-Typ-Hinweise (tier-farbige Chips) */
.card-foot{flex-shrink:0;padding:9px 14px 11px;background:rgba(120,96,48,0.08);border-top:1px solid var(--line-soft)}
.card-foot-label{font-size:var(--fs-label);text-transform:uppercase;letter-spacing:0.13em;color:var(--ink-soft);font-weight:600;text-align:center;margin-bottom:6px}
.card-themes{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.card-theme-tag{font-size:var(--fs-body);font-family:var(--serif);font-weight:600;letter-spacing:0.02em;padding:3px 11px;border-radius:20px}
.card-theme-tag.tc-origin{background:rgba(98,114,78,0.16);color:var(--might-origin);border:1px solid rgba(98,114,78,0.4)}
.card-theme-tag.tc-adventure{background:rgba(145,94,79,0.16);color:var(--might-adventure);border:1px solid rgba(145,94,79,0.4)}
.card-theme-tag.tc-greatness{background:rgba(101,108,107,0.18);color:#3f4b53;border:1px solid rgba(101,108,107,0.45)}
.card-theme-tag.tc-variable{background:rgba(169,134,70,0.16);color:#8a6a2e;border:1px solid rgba(169,134,70,0.45)}
/* Inhalts-Wrapper (Overlays bleiben außerhalb; nur dieser wird beim Bild-Upgrade getauscht) */
.card-content{flex:1;min-height:0;display:flex;flex-direction:column}
/* Vollbild-Layout: ganzseitige Illustration mit Verlauf-Scrim */
.card-photo{position:relative;flex:1;min-height:0;overflow:hidden}
.card-photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:opacity 0.3s ease}
.card-photo img.loaded{opacity:1}
.card-photo-eyebrow{position:absolute;top:10px;left:14px;color:#fdf6e3;font-size:var(--fs-label);text-transform:uppercase;letter-spacing:0.16em;font-weight:600;text-shadow:0 1px 5px rgba(0,0,0,0.65);z-index:2}
.card-scrim{position:absolute;left:0;right:0;bottom:0;padding:44px 16px 16px;background:linear-gradient(0deg,rgba(18,14,7,0.92) 0%,rgba(18,14,7,0.72) 42%,rgba(18,14,7,0.3) 72%,transparent 100%);text-align:center;z-index:1}
.card-scrim .card-title{font-size:var(--fs-display);color:#fdf6e3;text-shadow:0 1px 8px rgba(0,0,0,0.55);max-width:none}
.card-scrim .card-archetypes{color:#f3ead4;margin-top:8px}
.card-scrim .card-arch-label{color:#cdbf9f}
/* Theme-Typen im Bild integriert: Mini-Label + kräftig gefüllte Might-Chips */
.card-scrim-label{font-size:var(--fs-micro);text-transform:uppercase;letter-spacing:0.14em;color:#d8cca9;font-weight:600;margin:13px 0 6px}
.card-scrim .card-themes{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.card-scrim .card-theme-tag{color:#fbf3df;border:none}
.card-scrim .card-theme-tag.tc-origin{background:var(--might-origin-soft)}
.card-scrim .card-theme-tag.tc-adventure{background:var(--might-adventure-soft)}
.card-scrim .card-theme-tag.tc-greatness{background:var(--might-greatness-soft)}
.card-scrim .card-theme-tag.tc-variable{background:var(--gold)}
.card-decision-overlay{position:absolute;top:54px;font-family:var(--serif);font-size:2rem;font-style:italic;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:8px 16px;border:3px solid;border-radius:4px;opacity:0;pointer-events:none;transition:opacity 0.05s linear;z-index:5}
.card-decision-overlay.yes{right:18px;color:var(--green);border-color:var(--green);transform:rotate(-12deg)}
.card-decision-overlay.no{left:18px;color:var(--accent);border-color:var(--accent);transform:rotate(12deg)}
.swipe-controls{display:flex;justify-content:center;align-items:center;gap:14px;padding:10px 0 6px;flex-shrink:0}
.swipe-btn{width:64px;height:64px;border-radius:50%;border:2px solid;background:var(--paper);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s ease;box-shadow:0 2px 8px rgba(60,40,10,0.12)}
.swipe-btn:active{transform:scale(0.88)}
.swipe-btn-no{border-color:var(--accent);color:var(--accent)}
.swipe-btn-no:active{background:var(--accent);color:var(--paper)}
.swipe-btn-yes{border-color:var(--green);color:var(--green)}
.swipe-btn-yes:active{background:var(--green);color:var(--paper)}
.swipe-btn-undo{width:48px;height:48px;border-radius:50%;border:1px solid var(--line);background:rgba(250,243,223,0.9);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-soft);transition:all 0.15s ease}
.swipe-btn-undo:active{transform:scale(0.88)}
.swipe-btn-undo:disabled{opacity:0.3;cursor:not-allowed}
.swipe-btn svg{width:28px;height:28px}
.swipe-btn-undo svg{width:20px;height:20px}
/* #47: Skip-Button (erscheint nach 10 Swipes) */
.swipe-btn-skip{width:48px;height:48px;border-radius:50%;border:1px solid var(--line);background:rgba(250,243,223,0.9);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-soft);transition:all 0.15s ease}
.swipe-btn-skip:active{transform:scale(0.88);background:var(--bg-2)}
.swipe-btn-skip svg{width:20px;height:20px}
/* =====================================================
   ERGEBNIS-SCREEN (#38: feste Kartengröße, Carousel)
   BUG-SCHUTZ: Kein display-Property!
===================================================== */
#screen-result{padding:0;overflow:hidden;position:relative}
/* Heldenblatt: scrollbares Charakterblatt + fixierte Aktionsleiste */
.hb-scroll{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:calc(16px + env(safe-area-inset-top,0px)) 0 18px;position:relative;z-index:1}
.hb-actions{display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--line);background:var(--bg-2);flex-shrink:0;position:relative;z-index:1;padding-bottom:max(10px,env(safe-area-inset-bottom,10px))}
/* dezentes Korn auf dem Blatt (hinter den Inhalten, wie auf der Startseite) */
.hb-grain{position:absolute;inset:0;z-index:0;pointer-events:none;opacity:0.07;mix-blend-mode:multiply;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100' height='100' filter='url(%23n)'/></svg>")}
/* Heldenbogen: erhöhte Pergament-Fläche, hebt sich vom dunkleren Hintergrund ab */
.hb-sheet{position:relative;margin:0 12px 16px;background:var(--paper);border:1px solid var(--line);border-radius:12px;box-shadow:0 10px 30px rgba(50,35,10,0.28),0 2px 8px rgba(50,35,10,0.14);padding:18px 0 14px;overflow:hidden}

.hb-divider::before,.hb-divider::after{content:'';flex:1;max-width:90px;height:1px;background:linear-gradient(90deg,transparent,rgba(169,134,70,0.55))}

.hb-edit{position:absolute;right:12px;top:12px;width:30px;height:30px;border-radius:50%;border:1px solid var(--line);background:rgba(250,243,223,0.85);color:var(--ink-soft);display:none;align-items:center;justify-content:center;cursor:pointer;z-index:3;padding:0;box-shadow:0 1px 3px rgba(42,36,25,0.25)}

.hb-edit:active{transform:scale(0.9)}
.hb-hero{position:relative;text-align:center;padding:6px 52px 12px}
.hb-hero-eyebrow{font-size:var(--fs-label);letter-spacing:0.18em;text-transform:uppercase;color:var(--accent);font-weight:600}
.hb-hero-name{font-size:var(--fs-display);font-weight:700;font-style:italic;line-height:1.1;margin:4px 0 2px;color:var(--ink)}
.hb-hero-title{font-size:var(--fs-title);color:var(--accent);font-style:italic;line-height:1.25}
.hb-hero-desc{font-size:var(--fs-body-lg);color:var(--ink);line-height:1.5;margin-top:8px}
.hb-seclabel{font-size:var(--fs-label);letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;margin:0 0 6px}

/* Geschichte mittig */

.hb-theme.tc-origin{border-color:var(--might-origin-soft)}
.hb-theme.tc-adventure{border-color:var(--might-adventure-soft)}
.hb-theme.tc-greatness{border-color:var(--might-greatness-soft)}

/* Kopf-/Fußband in der Might-Farbe, heller Text (dezent, damit der Titel prominent bleibt) */
.hb-band{padding:6px 13px}
.hb-band,.hb-band *{color:#faf3df}
.hb-theme.tc-origin .hb-band{background:var(--might-origin-soft)}
.hb-theme.tc-adventure .hb-band{background:var(--might-adventure-soft)}
.hb-theme.tc-greatness .hb-band{background:var(--might-greatness-soft)}
.hb-band-head{display:flex;align-items:center;justify-content:space-between;gap:8px}

/* Mitte: neutral, kein Farbakzent (Titel -> Weakness) */
.hb-theme-mid{padding:13px 14px 14px;text-align:center}

.hb-weakness{font-size:var(--fs-title);line-height:1.3;color:#7a3010;background:rgba(170,80,20,0.10);border-radius:4px;padding:7px 12px;margin-top:8px}
/* Fußband: Quest, in der Might-Farbe */
.hb-band-foot{text-align:center}

.hb-band-foot .hb-quest-title{font-style:italic;font-weight:600;font-size:var(--fs-display);margin-top:4px;line-height:1.2}
.hb-band-foot .hb-quest-desc{font-size:var(--fs-body);line-height:1.5;margin-top:5px;opacity:0.95;text-wrap:pretty}
.hb-ph{margin:10px 12px 0;border:1px dashed var(--line);border-radius:8px;padding:14px;text-align:center;opacity:0.8}

.toggle-wrap{position:relative;flex-shrink:0}
.toggle-wrap input[type=checkbox]{position:absolute;opacity:0;width:0;height:0}

input[type=checkbox]:checked+.toggle-visual{background:var(--green)}

<div class="app">
<div class="app-bg" aria-hidden="true">
  <svg class="wb-mountains" viewBox="0 0 400 200" preserveAspectRatio="xMidYMax slice"><path d="M0,200 L0,118 L70,64 L140,108 L210,52 L290,104 L350,58 L400,92 L400,200 Z" fill="#7c8a8c"/><path d="M0,200 L0,150 L80,104 L170,150 L250,112 L330,150 L400,120 L400,200 Z" fill="#9aa69f"/></svg>
  <div class="wb-mist wb-mist-1"></div>
  <div class="wb-mist wb-mist-2"></div>
  <div class="wb-grain"></div>
</div>
<section id="screen-welcome" class="screen active">
  <div class="welcome-scroll">
    <div class="welcome-head">
      <div class="welcome-mark"></div>
      <h1 class="welcome-title"></h1>
    </div>
    <div class="welcome-preview" id="welcome-preview"></div>
    <button class="btn btn-primary" id="btn-start"></button>
    <button class="btn btn-ghost" id="btn-library" type="button"></button>
  </div>
  <div class="app-version">v2026-06-22.1</div>
</section>
<section id="screen-intro" class="screen">
  <div class="intro-wrap">
    <div class="intro-card">
      <div class="intro-band"><span class="intro-band-title" id="intro-title"></span></div>
      <div class="intro-body">
        <p class="intro-lead" id="intro-text"></p>
        <div class="intro-modelabel" id="intro-modelabel"></div>
        <div class="intro-modes" id="intro-modes" role="radiogroup">
          <button type="button" class="intro-mode" data-preset="beginner" role="radio" aria-checked="false">
            <span class="intro-mode-name"></span>
            <span class="intro-mode-tick" aria-hidden="true">✓</span>
          </button>
          <button type="button" class="intro-mode" data-preset="standard" role="radio" aria-checked="false">
            <span class="intro-mode-name"></span>
            <span class="intro-mode-tick" aria-hidden="true">✓</span>
          </button>
          <button type="button" class="intro-mode" data-preset="custom" role="radio" aria-checked="false">
            <span class="intro-mode-name"></span>
            <span class="intro-mode-tick" aria-hidden="true">✓</span>
          </button>
        </div>
        <div class="intro-modedesc" id="intro-modedesc"></div>
        <div class="intro-hint"><span id="intro-hint"></span> <a class="intro-settings-link" id="intro-settings-link" role="button" tabindex="0"></a></div>
      </div>
    </div>
    <div class="intro-actions">
      <button class="btn btn-ghost" id="btn-intro-back" type="button"></button>
      <button class="btn btn-primary" id="btn-intro-start"></button>
    </div>
  </div>
</section>
<section id="screen-swipe" class="screen">
  <div class="card-counter" id="card-counter"></div>
  <div class="card-stage" id="card-stage"></div>
  <div class="swipe-controls">
    <button class="swipe-btn swipe-btn-no" id="btn-no"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    <button class="swipe-btn-undo" id="btn-undo" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 00-15-6.7L3 13"/></svg></button>
    <button class="swipe-btn swipe-btn-yes" id="btn-yes"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></button>
    <button class="swipe-btn-skip" id="btn-skip" style="display:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
  </div>
</section>
<section id="screen-result" class="screen">
  <div class="hb-scroll" id="hb-scroll"></div>
  <div class="hb-actions">
    <button class="hb-action-ghost hb-act-normal" id="hb-edit" type="button"></button>
    <button class="hb-action-primary hb-act-normal" id="hb-save" type="button"></button>
    <button class="hb-action-ghost hb-act-normal" id="hb-restart" type="button"></button>
    <button class="hb-action-primary hb-act-edit" id="hb-done" type="button"></button>
  </div>
  <div id="edit-sheet-overlay">
    <div id="edit-sheet"><div class="edit-sheet-handle"></div><div id="edit-sheet-body"></div></div>
  </div>
</section>
<section id="screen-settings" class="screen">
  <div class="settings-header">
    <button class="settings-back-btn" id="btn-settings-back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
    <h2></h2>
  </div>
  <div class="settings-scroll">
    <div class="settings-group">
      <div class="settings-preset-intro" id="settings-preset-intro"></div>
      <div class="intro-modes" id="settings-preset-modes" role="radiogroup">
        <button type="button" class="intro-mode" data-preset="beginner" role="radio" aria-checked="false">
          <span class="intro-mode-name"></span><span class="intro-mode-tick" aria-hidden="true">✓</span>
        </button>
        <button type="button" class="intro-mode" data-preset="standard" role="radio" aria-checked="false">
          <span class="intro-mode-name"></span><span class="intro-mode-tick" aria-hidden="true">✓</span>
        </button>
        <button type="button" class="intro-mode" data-preset="custom" role="radio" aria-checked="false">
          <span class="intro-mode-name"></span><span class="intro-mode-tick" aria-hidden="true">✓</span>
        </button>
      </div>
      <div class="settings-group-sub settings-preset-hint" id="settings-preset-hint"></div>
    </div>
    <div class="settings-group">
      <div class="settings-tt-quick" id="settings-tt-quick">
        <button type="button" class="tt-quick-btn" data-act="all-on"></button>
        <button type="button" class="tt-quick-btn" data-act="all-off"></button>
        <button type="button" class="tt-quick-btn" data-act="reset"></button>
      </div>
      <div id="settings-themetypes-list"></div>
      <div class="settings-consequence" id="settings-consequence"></div>
    </div>
  </div>
</section>
</div>
<div class="loading-overlay" id="loading"><div class="loading-spinner"></div><div class="loading-text" id="loading-text"></div></div>
<div id="library-overlay">
  <div id="library-sheet">
    <div class="edit-sheet-handle"></div>
    <div class="lib-head">
      <h3 id="lib-title"></h3>
      <button type="button" id="lib-close" class="lib-close" aria-label="Schließen">×</button>
    </div>
    <div id="library-list"></div>
  </div>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
